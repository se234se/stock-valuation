<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票估值对比</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }

        /* 登录界面 */
        #login-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: #1e293b;
            padding: 48px 40px;
            border-radius: 16px;
            border: 1px solid #334155;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #f8fafc;
        }

        .login-box p {
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 10px;
            font-size: 16px;
            color: #f8fafc;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }

        .login-box input:focus {
            border-color: #3b82f6;
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .login-box button:hover {
            background: #2563eb;
        }

        .login-error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* 主界面 */
        #main-content {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
        }

        .header .meta {
            color: #64748b;
            font-size: 13px;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover { background: #2563eb; }

        .btn-secondary {
            background: #1e293b;
            color: #cbd5e1;
            border: 1px solid #334155;
        }

        .btn-secondary:hover { background: #334155; }

        .btn-secondary.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .search-box {
            padding: 8px 14px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 13px;
            color: #e2e8f0;
            outline: none;
            width: 200px;
        }

        .search-box:focus { border-color: #3b82f6; }

        .search-box::placeholder { color: #64748b; }

        /* 筛选标签 */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        /* 表格 */
        .table-container {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #0f172a;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: background 0.15s;
            border-bottom: 1px solid #334155;
        }

        th:hover { background: #1e293b; color: #e2e8f0; }

        th .sort-icon {
            display: inline-block;
            margin-left: 4px;
            color: #475569;
            font-size: 10px;
            width: 12px;
        }

        th.sort-asc .sort-icon::after { content: "▲"; color: #3b82f6; }
        th.sort-desc .sort-icon::after { content: "▼"; color: #3b82f6; }
        th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: "⇅"; }

        td {
            padding: 10px;
            border-bottom: 1px solid #1e293b;
        }

        tbody tr:hover { background: #252f47; }

        tbody tr:last-child td { border-bottom: none; }

        .stock-name {
            font-weight: 500;
            color: #f8fafc;
        }

        .stock-code {
            color: #64748b;
            font-size: 11px;
        }

        .number { font-variant-numeric: tabular-nums; text-align: right; }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .tag-a { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .tag-hk { background: rgba(236, 72, 153, 0.15); color: #f472b6; }
        .tag-jp { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .tag-us { background: rgba(34, 197, 94, 0.15); color: #4ade80; }

        .cat-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
        }

        .chg-up { color: #ef4444; }
        .chg-down { color: #22c55e; }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: #64748b;
        }

        .empty-state h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #e2e8f0;
        }

        .summary-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .summary-item {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px 20px;
            border-radius: 10px;
        }

        .summary-item .label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .summary-item .value {
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; }
            .search-box { width: 100%; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>股票估值对比</h1>
            <p>数据已加密，请输入访问密码</p>
            <input type="password" id="password-input" placeholder="密码" onkeydown="if(event.key==='Enter')checkPassword()">
            <button onclick="checkPassword()">进入</button>
            <div class="login-error" id="login-error">密码错误</div>
        </div>
    </div>

    <div id="main-content">
        <div class="header">
            <div>
                <h1>AI 半导体产业链估值对比</h1>
                <div class="meta">数据更新于 <span id="update-time">--</span> · 共 <span id="stock-count">0</span> 只 · 来源: Capital IQ</div>
            </div>
            <div class="header-actions">
                <input type="text" class="search-box" id="search-input" placeholder="搜索股票..." oninput="filterData()">
                <button class="btn btn-secondary" onclick="loadData()">刷新</button>
            </div>
        </div>

        <div class="summary-bar" id="summary-bar"></div>

        <div class="filter-bar" id="market-filters">
            <button class="btn btn-secondary active" onclick="setMarketFilter('all')">全部</button>
            <button class="btn btn-secondary" onclick="setMarketFilter('A股')">A股</button>
            <button class="btn btn-secondary" onclick="setMarketFilter('港股')">港股</button>
            <button class="btn btn-secondary" onclick="setMarketFilter('日股')">日股</button>
            <button class="btn btn-secondary" onclick="setMarketFilter('美股')">美股</button>
        </div>

        <div class="table-container">
            <table id="stock-table">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">市场 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(1)">分类 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(2)">股票名称 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(3)" style="text-align:right">股价 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(4)" style="text-align:right">2025涨 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(5)" style="text-align:right">YTD <span class="sort-icon"></span></th>
                        <th onclick="sortTable(6)" style="text-align:right">P/E 2025 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(7)" style="text-align:right">P/E 2026 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(8)" style="text-align:right">EV/EBITDA 2025 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(9)" style="text-align:right">EV/EBITDA 2026 <span class="sort-icon"></span></th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="10" class="empty-state"><h3>加载中...</h3></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            password: "VALUE2024",     // ← 修改密码（全大写）
            csvUrl: "data.csv",
            sessionHours: 8
        };

        let allData = [];
        let filteredData = [];
        let currentSort = { column: -1, ascending: true };
        let marketFilter = 'all';

        // ============ 密码 ============
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            // 简单哈希对比，避免明文密码直接出现在源码中（仍可被破解，只是增加一步）
            if (hashPassword(input) === hashPassword(CONFIG.password)) {
                localStorage.setItem('sv_auth', Date.now().toString());
                showMain();
            } else {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('password-input').value = '';
            }
        }

        function hashPassword(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) {
                h = ((h << 5) - h) + str.charCodeAt(i);
                h |= 0;
            }
            return h;
        }

        function showMain() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadData();
        }

        function checkAuth() {
            const auth = localStorage.getItem('sv_auth');
            if (auth && (Date.now() - parseInt(auth)) < CONFIG.sessionHours * 3600000) {
                showMain();
            }
        }

        // ============ 数据加载 ============
        async function loadData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><h3>加载中...</h3></td></tr>';

            try {
                const response = await fetch(CONFIG.csvUrl + '?t=' + Date.now());
                if (!response.ok) throw new Error('无法加载数据');
                const csv = await response.text();
                allData = parseCSV(csv);
                filterData();
                document.getElementById('update-time').textContent = new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                updateSummary();
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="10" class="empty-state"><h3>加载失败</h3><p>${err.message}</p></td></tr>`;
            }
        }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            if (lines.length < 2) return [];

            const delimiter = lines[0].includes('\t') ? '\t' : ',';
            const headers = lines[0].split(delimiter).map(h => h.trim().replace(/^["']|["']$/g, ''));

            return lines.slice(1).map(line => {
                const cells = line.split(delimiter).map(c => c.trim().replace(/^["']|["']$/g, ''));
                const get = (i) => cells[i] || '';
                const getNum = (i) => {
                    const v = parseFloat(cells[i]);
                    return isNaN(v) ? null : v;
                };

                return {
                    market: get(0),
                    category: get(1),
                    name: get(2),
                    ticker: get(3),
                    currency: get(4),
                    price: getNum(5),
                    chg25: getNum(6),
                    ytd: getNum(7),
                    pe25: getNum(8),
                    pe26: getNum(9),
                    ev25: getNum(10),
                    ev26: getNum(11)
                };
            }).filter(r => r.name);
        }

        // ============ 筛选 ============
        function setMarketFilter(m) {
            marketFilter = m;
            document.querySelectorAll('#market-filters .btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            filterData();
        }

        function filterData() {
            const query = document.getElementById('search-input').value.toLowerCase();

            filteredData = allData.filter(row => {
                const matchMarket = marketFilter === 'all' || row.market === marketFilter;
                const matchSearch = !query ||
                    row.name.toLowerCase().includes(query) ||
                    row.ticker.toLowerCase().includes(query) ||
                    row.category.toLowerCase().includes(query);
                return matchMarket && matchSearch;
            });

            // 应用当前排序
            if (currentSort.column >= 0) {
                applySort();
            }

            renderTable(filteredData);
            document.getElementById('stock-count').textContent = filteredData.length;
        }

        // ============ 排序 ============
        function sortTable(column) {
            const keys = ['market', 'category', 'name', 'price', 'chg25', 'ytd', 'pe25', 'pe26', 'ev25', 'ev26'];
            const key = keys[column];

            if (currentSort.column === column) {
                currentSort.ascending = !currentSort.ascending;
            } else {
                currentSort = { column, ascending: true };
            }

            document.querySelectorAll('th').forEach((th, i) => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (i === column) {
                    th.classList.add(currentSort.ascending ? 'sort-asc' : 'sort-desc');
                }
            });

            applySort();
            renderTable(filteredData);
        }

        function applySort() {
            const keys = ['market', 'category', 'name', 'price', 'chg25', 'ytd', 'pe25', 'pe26', 'ev25', 'ev26'];
            const key = keys[currentSort.column];

            filteredData.sort((a, b) => {
                let va = a[key], vb = b[key];
                if (va === null) return currentSort.ascending ? 1 : -1;
                if (vb === null) return currentSort.ascending ? -1 : 1;
                if (typeof va === 'string') {
                    va = va.toLowerCase(); vb = vb.toLowerCase();
                }
                if (va < vb) return currentSort.ascending ? -1 : 1;
                if (va > vb) return currentSort.ascending ? 1 : -1;
                return 0;
            });
        }

        // ============ 渲染 ============
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><h3>无匹配数据</h3></td></tr>';
                return;
            }

            const marketClass = {
                'A股': 'tag-a', '港股': 'tag-hk', '日股': 'tag-jp', '美股': 'tag-us'
            };

            const fmt = (v, pct = false) => {
                if (v === null || v === undefined) return '--';
                if (pct) {
                    const cls = v > 0 ? 'chg-up' : (v < 0 ? 'chg-down' : '');
                    const sign = v > 0 ? '+' : '';
                    return `<span class="${cls}">${sign}${(v * 100).toFixed(1)}%</span>`;
                }
                if (Math.abs(v) >= 1000) return v.toFixed(0);
                if (Math.abs(v) >= 10) return v.toFixed(1);
                return v.toFixed(2);
            };

            const fmtPe = (v) => {
                if (v === null || v === undefined) return '--';
                if (v < 0) return `<span style="color:#94a3b8">(${Math.abs(v).toFixed(1)})</span>`;
                return v.toFixed(1);
            };

            tbody.innerHTML = data.map(row => {
                const tag = marketClass[row.market] || 'tag-a';
                return `<tr>
                    <td><span class="tag ${tag}">${row.market}</span></td>
                    <td><span class="cat-tag">${row.category}</span></td>
                    <td><div class="stock-name">${row.name}</div><div class="stock-code">${row.ticker} · ${row.currency}</div></td>
                    <td class="number">${fmt(row.price)}</td>
                    <td class="number">${fmt(row.chg25, true)}</td>
                    <td class="number">${fmt(row.ytd, true)}</td>
                    <td class="number">${fmtPe(row.pe25)}</td>
                    <td class="number">${fmtPe(row.pe26)}</td>
                    <td class="number">${fmtPe(row.ev25)}</td>
                    <td class="number">${fmtPe(row.ev26)}</td>
                </tr>`;
            }).join('');
        }

        // ============ 统计 ============
        function updateSummary() {
            const counts = {};
            allData.forEach(r => { counts[r.market] = (counts[r.market] || 0) + 1; });

            const html = Object.entries(counts).map(([m, c]) => `
                <div class="summary-item">
                    <div class="label">${m}</div>
                    <div class="value">${c}</div>
                </div>
            `).join('');

            document.getElementById('summary-bar').innerHTML = html;
        }

        // ============ 初始化 ============
        checkAuth();
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('password-input');
            if (input) input.focus();
        });
    </script>
</body>
</html>
